<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Omnitrix Canary Release Demo — Stable Version">
  <title>Omnitrix — Stable Release</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #22d3ee;
      --accent-glow: rgba(34, 211, 238, 0.25);
      --bg: #0a0e1a;
      --surface: rgba(255, 255, 255, 0.04);
      --border: rgba(255, 255, 255, 0.08);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Ambient background orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.3;
      z-index: 0;
      animation: float 20s ease-in-out infinite;
    }
    body::before {
      width: 500px; height: 500px;
      background: var(--accent);
      top: -150px; left: -100px;
    }
    body::after {
      width: 400px; height: 400px;
      background: #6366f1;
      bottom: -100px; right: -80px;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -20px) scale(1.05); }
      66% { transform: translate(-20px, 15px) scale(0.95); }
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      animation: fadeUp 0.8s ease-out;
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 25px;
      background: linear-gradient(135deg, var(--accent-glow), transparent 50%);
      z-index: -1;
      opacity: 0.5;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(34, 211, 238, 0.1);
      border: 1px solid rgba(34, 211, 238, 0.2);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 28px;
    }
    .badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .logo {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .version {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 auto 28px;
      width: 60%;
    }

    .info {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      text-align: left;
    }
    .info-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: border-color 0.3s ease, background 0.3s ease;
    }
    .info-item:hover {
      border-color: rgba(34, 211, 238, 0.3);
      background: rgba(34, 211, 238, 0.03);
    }
    .info-label {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: var(--text-muted);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge"><span class="dot"></span> Stable Release</div>
    <div class="logo">⚙️</div>
    <h1>Omnitrix Platform</h1>
    <p class="version">v1.0 — Stable</p>
    <div class="divider"></div>
    <div class="info">
      <div class="info-item">
        <div class="info-label">Track</div>
        <div class="info-value">Production</div>
      </div>
      <div class="info-item">
        <div class="info-label">Release</div>
        <div class="info-value">Stable</div>
      </div>
      <div class="info-item">
        <div class="info-label">Mesh</div>
        <div class="info-value">Istio mTLS</div>
      </div>
      <div class="info-item">
        <div class="info-label">Weight</div>
        <div class="info-value">90%</div>
      </div>
    </div>
    <p class="footer">Canary deployment powered by Istio + ArgoCD</p>
  </div>
</body>
</html>
