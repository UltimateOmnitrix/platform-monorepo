apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: cloudrun-app-capability
  title: Cloud Run App Capability Package
  description: >
    Deploys a Cloud Run service using the Factory Terraform Engine.
    Requires a previously created sandbox environment.
  tags:
    - gcp
    - cloudrun
    - terraform
spec:
  owner: platform-team
  type: service

  parameters:
    - title: Cloud Run Application Details
      required:
        - app_name
        - sandbox_ref
      properties:
        app_name:
          title: Application Name
          type: string
          description: Unique name for your Cloud Run service (e.g. nextweb)
          pattern: '^[a-z][a-z0-9-]{2,20}$'
          ui:autofocus: true
        sandbox_ref:
          title: Related Sandbox Name
          type: string
          description: Which sandbox this belongs to (for grouping)
          ui:field: EntityPicker
          ui:options:
            allowedKinds:
              - Resource
            defaultKind: Resource
            filter:
              apiVersion: backstage.io/v1alpha1
              kind: Resource
              spec.type: gcp-sandbox
        environment:
          title: Environment
          type: string
          default: dev
          enum:
            - dev
            - qa
            - prod
        region:
          title: GCP Region
          type: string
          default: us-central1
          enum:
            - us-central1
            - us-east1
            - europe-west1

  steps:
    - id: fetch-base
      name: Fetch App Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: infrastructure/factory/data/apps
        values:
          app_name: ${{ parameters.app_name }}
          sandbox_ref: ${{ parameters.sandbox_ref }}
          environment: ${{ parameters.environment }}
          region: ${{ parameters.region }}

    - id: publish
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=platform-monorepo&owner=UltimateOmnitrix
        branchName: cloudrun-${{ parameters.app_name }}
        title: '🚀 New Cloud Run App: ${{ parameters.app_name }}'
        description: |
          ## New Cloud Run Capability Application

          **App Name**: ${{ parameters.app_name }}
          **Sandbox**: ${{ parameters.sandbox_ref }}
          **Environment**: ${{ parameters.environment }}

          > Auto-generated by Omnitrix Portal.
          > After merge, Factory Terraform creates the Cloud Run service.

  output:
    links:
      - title: View Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
