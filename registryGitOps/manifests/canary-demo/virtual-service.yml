## External traffic — via Istio Gateway (accepts any Host header)
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: canary-demo-external
  namespace: canary-demo
spec:
  hosts:
    - "*"
  gateways:
    - canary-demo-gateway
  http:
    - route:
        - destination:
            host: canary-demo.canary-demo.svc.cluster.local
            subset: stable
            port:
              number: 80
          weight: 90
        - destination:
            host: canary-demo.canary-demo.svc.cluster.local
            subset: canary
            port:
              number: 80
          weight: 10
---
## Internal mesh traffic — pod-to-pod within the cluster
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: canary-demo-mesh
  namespace: canary-demo
spec:
  hosts:
    - canary-demo
    - canary-demo.canary-demo.svc.cluster.local
  gateways:
    - mesh
  http:
    - route:
        - destination:
            host: canary-demo.canary-demo.svc.cluster.local
            subset: stable
            port:
              number: 80
          weight: 90
        - destination:
            host: canary-demo.canary-demo.svc.cluster.local
            subset: canary
            port:
              number: 80
          weight: 10
