name: "🏭 Factory Terraform Pipeline"

on:
    push:
        branches: [main]
        paths:
            - "infrastructure/factory/**"
    pull_request:
        branches: [main]
        paths:
            - "infrastructure/factory/**"
    workflow_dispatch:

permissions:
    contents: read
    id-token: write
    pull-requests: write

env:
    PROJECT_ID: "prodaccount"

jobs:
    terraform:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: "Authenticate to GCP (WIF)"
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: "${{ vars.WIF_PROVIDER_ID }}"
                  service_account: "githubactions-prodaccount@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"

            - name: "Setup Terraform"
              uses: hashicorp/setup-terraform@v3

            - name: "Factory: Init"
              run: |
                  cd infrastructure/factory
                  terraform init -backend-config="bucket=${{ env.PROJECT_ID }}-tf-state"

            - name: "Factory: Plan"
              run: |
                  cd infrastructure/factory
                  terraform plan -var-file="prod.tfvars" -no-color -out=plan.out 2>&1 | tee plan.txt

            - name: "Comment Plan on PR"
              if: github.event_name == 'pull_request'
              uses: actions/github-script@v7
              with:
                  script: |
                      const fs = require('fs');
                      const plan = fs.readFileSync('infrastructure/factory/plan.txt', 'utf8');
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: `## 🏭 Factory Terraform Plan\n\`\`\`\n${plan.slice(-3000)}\n\`\`\``
                      });

            - name: "Factory: Apply"
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              run: |
                  cd infrastructure/factory
                  terraform apply -auto-approve -var-file="prod.tfvars"
