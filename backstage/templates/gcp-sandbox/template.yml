apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: create-gcp-sandbox
  title: Create a GCP Sandbox
  description: >
    Creates a GCP Sandbox environment with isolated resources.
    Generates a Factory YAML file and creates a PR for provisioning.
  tags:
    - gcp
    - sandbox
    - terraform
    - golden-path
spec:
  owner: platform-team
  type: infrastructure

  parameters:
    - title: Create a GCP Sandbox
      required:
        - sandbox_name
        - owner_email
      properties:
        sandbox_name:
          title: Sandbox Name
          type: string
          description: Unique name (lowercase, no spaces, max 15 chars)
          pattern: "^[a-z][a-z0-9]{2,14}$"
          ui:autofocus: true
        owner_email:
          title: Owner Email
          type: string
          description: Your Google Cloud email for IAM access
        region:
          title: Region
          type: string
          default: US
          enum:
            - US
            - EU
            - ASIA
          description: GCP region for resources

  steps:
    - id: fetch-base
      name: Fetch Sandbox Skeleton
      action: fetch:template
      input:
        url: ./skeleton
        targetPath: infrastructure/factory/data/sandboxes
        values:
          sandbox_name: ${{ parameters.sandbox_name }}
          owner_email: ${{ parameters.owner_email }}
          region: ${{ parameters.region }}

    - id: publish
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: github.com?repo=platform-monorepo&owner=UltimateOmnitrix
        branchName: sandbox-${{ parameters.sandbox_name }}
        title: "🏖️ New Sandbox: ${{ parameters.sandbox_name }}"
        description: |
          ## New GCP Sandbox Request

          **Name**: ${{ parameters.sandbox_name }}
          **Owner**: ${{ parameters.owner_email }}
          **Region**: ${{ parameters.region }}

          > Auto-generated by Omnitrix Portal.
          > After merge, Factory Terraform creates the resources.

  output:
    links:
      - title: View Pull Request
        url: ${{ steps.publish.output.remoteUrl }}
